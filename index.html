<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basalt</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <span class="brand-title">Basalt</span>
          <span class="brand-tag">Markdown windows for agent output</span>
        </div>
        <div class="doc-block">
          <span class="doc-name" id="doc-name">No document loaded</span>
          <span class="doc-path" id="doc-path">Open via terminal to get started.</span>
        </div>
        <div class="actions">
          <label class="theme-picker" for="theme-select">
            Theme
            <select id="theme-select" aria-label="Select theme">
              <option value="obsidian">Obsidian Night</option>
              <option value="paper">Graph Paper</option>
              <option value="grove">Moss Grove</option>
            </select>
          </label>
          <button id="reload-btn" type="button">Reload</button>
          <button id="vscode-btn" type="button">Open in VS Code</button>
        </div>
      </header>

      <main class="viewer-wrap">
        <article id="viewer" class="viewer" aria-live="polite"></article>
      </main>

      <footer class="status" id="status">Ready.</footer>
    </div>
  </body>
</html>
