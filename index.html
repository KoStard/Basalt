<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basalt</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="viewer-wrap">
        <div class="corner-actions">
          <button
            id="vscode-btn"
            class="icon-btn"
            type="button"
            title="Open in VS Code"
            aria-label="Open in VS Code"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path
                d="M15.6 2.3a1 1 0 0 1 1.6-.78l4.9 3.53a1 1 0 0 1 .42.81v12.28a1 1 0 0 1-.42.81l-4.9 3.53a1 1 0 0 1-1.6-.78v-3.1l-6.78 2.06a1 1 0 0 1-1.23-.64L5.3 14.3l-2.6 2.56a1 1 0 0 1-1.37.02l-1-1a1 1 0 0 1 .02-1.42l3.13-3.03-3.13-3.03a1 1 0 0 1-.02-1.42l1-1a1 1 0 0 1 1.37.02L5.3 8.56l2.28-5.65a1 1 0 0 1 1.23-.64l6.78 2.06v-2zM9.4 6.36l-2.56 5.14 2.56 5.14 6.2 1.88V4.48L9.4 6.36z"
              />
            </svg>
          </button>
        </div>
        <article id="viewer" class="viewer" aria-live="polite"></article>
      </main>

      <footer class="bottom-bar">
        <span class="doc-path" id="doc-path">Open via terminal to get started.</span>
        <span class="status-text" id="status-text">Ready.</span>
      </footer>
    </div>

    <div id="command-palette" class="command-palette" hidden>
      <button class="command-backdrop" type="button" data-close-palette aria-label="Close command palette"></button>
      <section class="command-panel" role="dialog" aria-modal="true" aria-label="Command palette">
        <input
          id="command-input"
          class="command-input"
          type="text"
          spellcheck="false"
          autocomplete="off"
          placeholder="Type a command"
          aria-label="Command palette input"
        />
        <ul id="command-results" class="command-results"></ul>
      </section>
    </div>
  </body>
</html>
