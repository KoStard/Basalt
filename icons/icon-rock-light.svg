<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="rock-face" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5a5e62"/>
      <stop offset="55%" stop-color="#3a3d40"/>
      <stop offset="100%" stop-color="#252729"/>
    </linearGradient>
    <linearGradient id="facet-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a8085" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4a4e52" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="facet-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2e3133"/>
      <stop offset="100%" stop-color="#1e2022"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Light background -->
  <rect width="512" height="512" rx="96" fill="#f0ede6"/>

  <!-- Rock group with shadow -->
  <g filter="url(#shadow)">
    <!-- Main front face — large irregular polygon -->
    <polygon
      points="180,148 290,108 370,152 388,248 362,330 290,372 196,368 138,300 132,210"
      fill="url(#rock-face)"/>

    <!-- Top-left lighter facet (catches light) -->
    <polygon
      points="180,148 290,108 310,168 230,192 138,210 132,210"
      fill="url(#facet-top)" opacity="0.9"/>

    <!-- Right darker facet (in shadow) -->
    <polygon
      points="370,152 388,248 362,330 340,280 350,190"
      fill="url(#facet-right)"/>

    <!-- Fracture line 1 — main diagonal crack -->
    <line x1="230" y1="192" x2="310" y2="340" stroke="#1e2022" stroke-width="2" opacity="0.6"/>

    <!-- Fracture line 2 — secondary crack -->
    <line x1="310" y1="168" x2="362" y2="248" stroke="#1e2022" stroke-width="1.5" opacity="0.4"/>

    <!-- Fracture line 3 — small surface crack -->
    <line x1="196" y1="280" x2="290" y2="310" stroke="#1e2022" stroke-width="1" opacity="0.35"/>

    <!-- Subtle specular highlight on top face edge -->
    <line x1="200" y1="152" x2="290" y2="112" stroke="#9aa0a6" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
